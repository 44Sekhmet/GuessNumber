<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜數字遊戲 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card: #1a1a2e;
    --accent: #ff6b35;
    --accent2: #f7c59f;
    --text: #fffffe;
    --muted: #a7a9be;
    --green: #4ecdc4;
    --red: #ff6b6b;
    --border: rgba(255,107,53,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
  }
  .container { width: 100%; max-width: 480px; padding: 20px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 32px; animation: slideDown 0.6s ease; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .title-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    animation: fadeUp 0.6s ease 0.2s both;
    box-shadow: 0 0 40px rgba(255,107,53,0.08);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .range-display {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .range-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent2);
    transition: all 0.3s ease;
  }
  .range-num.changed { animation: numPop 0.3s ease; }
  @keyframes numPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--accent); }
    100% { transform: scale(1); }
  }
  .range-label { font-size: 0.7rem; color: var(--muted); text-align: center; letter-spacing: 1px; text-transform: uppercase; }
  .progress-section { margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; font-family: 'Space Mono', monospace; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; transition: width 0.5s ease; width: 100%; }
  .hint {
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    margin-bottom: 16px;
    padding: 12px;
    text-align: center;
  }
  .hint.too-high { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.3); color: var(--red); animation: shake 0.4s ease; }
  .hint.too-low { background: rgba(78,205,196,0.12); border: 1px solid rgba(78,205,196,0.3); color: var(--green); animation: shakeRight 0.4s ease; }
  .hint.correct { background: rgba(255,197,79,0.12); border: 1px solid rgba(255,197,79,0.35); color: #ffc54f; animation: pop 0.5s ease; }
  .hint.idle { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: var(--muted); }
  .hint.error { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.3); color: var(--red); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  @keyframes shakeRight { 0%,100%{transform:translateX(0)} 25%{transform:translateX(8px)} 75%{transform:translateX(-8px)} }
  @keyframes pop { 0%{transform:scale(0.9);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  .input-group { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="number"] {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    padding: 14px 18px;
    outline: none;
    transition: all 0.2s;
    -moz-appearance: textfield;
    text-align: center;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); background: rgba(255,107,53,0.07); box-shadow: 0 0 0 3px rgba(255,107,53,0.15); }
  input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }
  button.guess-btn {
    background: var(--accent); color: white; border: none; border-radius: 12px;
    padding: 14px 22px; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; white-space: nowrap;
  }
  button.guess-btn:hover:not(:disabled) { background: #ff8555; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,53,0.4); }
  button.guess-btn:active:not(:disabled) { transform: translateY(0); }
  button.guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .attempts-badge { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); text-align: right; margin-bottom: 4px; }
  .history-title { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 8px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; }
  .history-chip { font-family: 'Space Mono', monospace; font-size: 0.78rem; padding: 3px 10px; border-radius: 20px; border: 1px solid; animation: chipIn 0.2s ease; }
  @keyframes chipIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .history-chip.high { color: var(--red); border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.08); }
  .history-chip.low { color: var(--green); border-color: rgba(78,205,196,0.35); background: rgba(78,205,196,0.08); }
  .win-screen { display: none; text-align: center; animation: fadeUp 0.5s ease; }
  .win-screen.show { display: block; }
  .trophy { font-size: 4rem; margin-bottom: 12px; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .win-title { font-size: 1.6rem; font-weight: 900; color: #ffc54f; margin-bottom: 8px; }
  .win-msg { font-size: 0.95rem; color: var(--accent2); line-height: 1.6; margin-bottom: 8px; }
  .win-stats { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }
  button.restart-btn {
    background: transparent; color: var(--accent); border: 1.5px solid var(--accent);
    border-radius: 12px; padding: 12px 28px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif;
  }
  button.restart-btn:hover { background: var(--accent); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,53,0.4); }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 16px 0; }
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="container">
  <div class="header">
    <div class="title-tag">🎯 MINI GAME</div>
    <h1>猜數字</h1>
    <p class="subtitle">找出 1 到 100 之間的神秘數字</p>
  </div>
  <div class="card">
    <div class="range-display">
      <div>
        <div class="range-num" id="min-num">1</div>
        <div class="range-label">下限</div>
      </div>
      <div style="color:var(--muted)">—</div>
      <div style="text-align:center">
        <div style="font-size:1.5rem">🎯</div>
        <div class="range-label">範圍</div>
      </div>
      <div style="color:var(--muted)">—</div>
      <div style="text-align:right">
        <div class="range-num" id="max-num">100</div>
        <div class="range-label">上限</div>
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>縮小範圍</span>
        <span id="range-size">100 個可能</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="hint idle" id="hint">輸入你的猜測，按下確定！</div>
    <div class="input-group">
      <input type="number" id="guess-input" placeholder="?" min="1" max="100" autofocus>
      <button class="guess-btn" id="guess-btn" onclick="makeGuess()">確定</button>
    </div>
    <div class="attempts-badge" id="attempts-label">第 0 次猜測</div>
    <div class="history-title">猜測紀錄</div>
    <div class="history-list" id="history-list"></div>
    <div class="divider" id="win-divider" style="display:none"></div>
    <div class="win-screen" id="win-screen">
      <div class="trophy">🏆</div>
      <div class="win-title">答對了！🎉</div>
      <div class="win-msg">恭喜你！你將可於週三獲得<br>一杯免費的星巴克咖啡 ☕</div>
      <div class="win-stats" id="win-stats"></div>
      <button class="restart-btn" onclick="restart()">再玩一次 🔄</button>
    </div>
  </div>
</div>

<script>
let gameId = null;
let gameOver = false;

async function init() {
  gameOver = false;
  gameId = null;

  // Reset UI
  document.getElementById('min-num').textContent = '1';
  document.getElementById('max-num').textContent = '100';
  document.getElementById('range-size').textContent = '100 個可能';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('hint').className = 'hint idle';
  document.getElementById('hint').textContent = '載入中...';
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('attempts-label').textContent = '第 0 次猜測';
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('win-divider').style.display = 'none';
  document.getElementById('guess-input').disabled = true;
  document.getElementById('guess-btn').disabled = true;
  document.getElementById('guess-input').value = '';

  try {
    const res = await fetch('/api/new', { method: 'POST' });
    const data = await res.json();
    gameId = data.game_id;
    document.getElementById('hint').textContent = '輸入你的猜測，按下確定！';
    document.getElementById('guess-input').disabled = false;
    document.getElementById('guess-btn').disabled = false;
    document.getElementById('guess-input').focus();
  } catch (e) {
    document.getElementById('hint').className = 'hint error';
    document.getElementById('hint').textContent = '⚠️ 無法連線到 Server，請確認 app.py 是否有在執行';
  }
}

async function makeGuess() {
  if (gameOver || !gameId) return;
  const input = document.getElementById('guess-input');
  const val = parseInt(input.value);

  if (isNaN(val) || val < 1 || val > 100) {
    setHint('too-high', '⚠️ 請輸入 1 到 100 之間的數字！');
    input.focus();
    return;
  }

  document.getElementById('guess-btn').disabled = true;

  try {
    const res = await fetch('/api/guess', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game_id: gameId, guess: val })
    });
    const data = await res.json();

    if (data.error) {
      setHint('error', '⚠️ ' + data.error);
      document.getElementById('guess-btn').disabled = false;
      return;
    }

    document.getElementById('attempts-label').textContent = `第 ${data.attempts} 次猜測`;

    const histList = document.getElementById('history-list');
    const chip = document.createElement('span');

    if (data.result === 'correct') {
      gameOver = true;
      setHint('correct', `🎯 就是 ${val}！`);
      input.disabled = true;
      chip.className = 'history-chip';
      chip.style.cssText = 'color:#ffc54f;border-color:rgba(255,197,79,0.4);background:rgba(255,197,79,0.1)';
      chip.textContent = `✓ ${val}`;
      histList.appendChild(chip);
      document.getElementById('win-divider').style.display = 'block';
      document.getElementById('win-stats').textContent = `你猜了 ${data.attempts} 次才找到答案！`;
      document.getElementById('win-screen').classList.add('show');
      launchConfetti();
    } else if (data.result === 'too_high') {
      setHint('too-high', `📉 ${data.message}`);
      chip.className = 'history-chip high';
      chip.textContent = `↓ ${val}`;
      histList.appendChild(chip);
      updateRange(data.min, data.max);
      document.getElementById('guess-btn').disabled = false;
    } else {
      setHint('too-low', `📈 ${data.message}`);
      chip.className = 'history-chip low';
      chip.textContent = `↑ ${val}`;
      histList.appendChild(chip);
      updateRange(data.min, data.max);
      document.getElementById('guess-btn').disabled = false;
    }

    input.value = '';
    if (!gameOver) input.focus();

  } catch (e) {
    setHint('error', '⚠️ 網路錯誤，請重試');
    document.getElementById('guess-btn').disabled = false;
  }
}

function setHint(cls, msg) {
  const el = document.getElementById('hint');
  el.className = 'hint ' + cls;
  el.textContent = msg;
}

function updateRange(min, max) {
  const minEl = document.getElementById('min-num');
  const maxEl = document.getElementById('max-num');
  minEl.textContent = min;
  maxEl.textContent = max;
  minEl.classList.remove('changed'); void minEl.offsetWidth; minEl.classList.add('changed');
  maxEl.classList.remove('changed'); void maxEl.offsetWidth; maxEl.classList.add('changed');
  const size = max - min + 1;
  document.getElementById('range-size').textContent = `${size} 個可能`;
  document.getElementById('progress-fill').style.width = (size) + '%';
}

function restart() { init(); }

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !gameOver) makeGuess();
});

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#ff6b35','#f7c59f','#4ecdc4','#ffc54f','#ff6b6b','#fffffe'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 200,
    r: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4,
    rot: Math.random() * 360, vrot: (Math.random() - 0.5) * 6,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.vy += 0.06;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame / 200);
      if (p.shape === 'rect') { ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r); }
      else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    frame++;
    if (frame < 220) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

init();
</script>
</body>
</html>
